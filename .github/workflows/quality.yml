name: Qualidade

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Build e interações reais
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Verificar TypeScript
        run: npm run typecheck

      - name: Testar contratos, papéis e isolamento
        run: npm run test:unit

      - name: Compilar para produção
        run: npm run build

      - name: Instalar Chromium do Playwright
        run: npx playwright install --with-deps chromium

      - name: Testar login, menus, formulários, CRUD e navegação
        run: npm run test:e2e

      - name: Publicar relatório do Playwright em caso de falha
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-playwright
          path: playwright-report/
          retention-days: 7
